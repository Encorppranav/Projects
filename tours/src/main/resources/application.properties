spring.application.name=tours

spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Spring Security

spring.security.user.name=admin
spring.security.user.password=root@123



#Logging Configuration
# Set the logging level
#TRACE ensures that all logging levels (TRACE, DEBUG, INFO, WARN, ERROR)
logging.level.root=WARN
logging.level.com.tours=DEBUG

# Specify a custom log file
logging.file.name=src/main/java/com/tours/Logging/app.log

# Set log file size and total log file
logging.file.size=1000MB
logging.file.total-size-cap=10000MB

# Define log pattern
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %5p - %c{1} - %m%n
logging.pattern.console= %d{yyyy-MM-dd HH:mm:ss} - %5p - %c{1} - %m%n



#OAuth2 Configuration
#Google Configure
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=client_id
spring.security.oauth2.client.registration.google.client-secret=secret-key
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri= redirect-uri

spring.main.allow-circular-references=true

#Cloudinary Configuration
cloudinary.cloud_name=name
cloudinary.api_key= api-key
cloudinary.api_secret= secret_key




# Stripe Configuration
stripe.secret.key= secret_key
stripe.publishable.key= your_key